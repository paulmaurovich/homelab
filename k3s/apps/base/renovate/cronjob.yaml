---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "0 6 * * 0" # Every Sunday at 06:00 o'clock
  timeZone: "Europe/Vienna"
  # skip scheduling of a new job when a prior one is still running
  # make sure only one renovate instance is running at a given time (race conditions)
  # avoids race conditions, duplicate PRs, corrupted cache
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: renovate
              image: ghcr.io/renovatebot/renovate:43.110.16@sha256:6f8f5b88c04d0cad564d9a707bf63a5712d4ae4a53ee3840a6eecbc51b7a7d24
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  memory: "512Mi"
                limits:
                  memory: "1Gi"
              envFrom:
                - configMapRef:
                    name: renovate-config
                - secretRef:
                    name: renovate-secrets
              volumeMounts:
                - name: renovate-tmp
                  mountPath: /tmp/renovate
                - name: renovate-cache
                  mountPath: /tmp/renovate/cache
          volumes:
            - name: renovate-tmp
              emptyDir: {}
            - name: renovate-cache
              persistentVolumeClaim:
                claimName: renovate-cache
