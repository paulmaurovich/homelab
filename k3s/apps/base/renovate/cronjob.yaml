---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "0 4 * * *" # Every day at 04:00 o'clock
  timeZone: "Europe/Vienna"
  # skip scheduling of a new job when a prior one is still running
  # make sure only one renovate instance is running at a given time (race conditions)
  # avoids race conditions, duplicate PRs, corrupted cache
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: renovate
              image: ghcr.io/renovatebot/renovate:43.120.1@sha256:6488fcff4416a3872e2bbb305bfff73e9aa65556e89c39778c2920a2a52832ed
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  memory: "512Mi"
                limits:
                  memory: "1Gi"
              envFrom:
                - configMapRef:
                    name: renovate-config
                - secretRef:
                    name: renovate-secrets
              volumeMounts:
                - name: renovate-tmp
                  mountPath: /tmp/renovate
                - name: renovate-cache
                  mountPath: /tmp/renovate/cache
          volumes:
            - name: renovate-tmp
              emptyDir: {}
            - name: renovate-cache
              persistentVolumeClaim:
                claimName: renovate-cache
