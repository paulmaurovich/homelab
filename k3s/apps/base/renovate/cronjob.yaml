---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  # GitHub rate limits are so strict that I have to shut down the cron job
  # for the foreseeable future and set it to run once a year.
  schedule: "0 0 1 1 *"
  # schedule: "0 4 * * *" # Every day at 04:00 o'clock
  timeZone: "Europe/Vienna"
  # skip scheduling of a new job when a prior one is still running
  # make sure only one renovate instance is running at a given time (race conditions)
  # avoids race conditions, duplicate PRs, corrupted cache
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: renovate
              image: ghcr.io/renovatebot/renovate:43.263.6@sha256:98ec7a9df71f91f1d137cfb26c6028e55b2e8c5adf8fcb70201eceb6d361834e
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  memory: "512Mi"
                limits:
                  memory: "1Gi"
              envFrom:
                - configMapRef:
                    name: renovate-config
                - secretRef:
                    name: renovate-secrets
              volumeMounts:
                - name: renovate-tmp
                  mountPath: /tmp/renovate
                - name: renovate-cache
                  mountPath: /tmp/renovate/cache
          volumes:
            - name: renovate-tmp
              emptyDir: {}
            - name: renovate-cache
              persistentVolumeClaim:
                claimName: renovate-cache
