---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "0 4 * * *" # Every day at 04:00 o'clock
  timeZone: "Europe/Vienna"
  # skip scheduling of a new job when a prior one is still running
  # make sure only one renovate instance is running at a given time (race conditions)
  # avoids race conditions, duplicate PRs, corrupted cache
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: renovate
              image: ghcr.io/renovatebot/renovate:43.141.5@sha256:8fb9e3cfdadc0994fb87f57be624d1c1940c41c1c53c074465caff85a2b6d3a4
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  memory: "512Mi"
                limits:
                  memory: "1Gi"
              envFrom:
                - configMapRef:
                    name: renovate-config
                - secretRef:
                    name: renovate-secrets
              volumeMounts:
                - name: renovate-tmp
                  mountPath: /tmp/renovate
                - name: renovate-cache
                  mountPath: /tmp/renovate/cache
          volumes:
            - name: renovate-tmp
              emptyDir: {}
            - name: renovate-cache
              persistentVolumeClaim:
                claimName: renovate-cache
