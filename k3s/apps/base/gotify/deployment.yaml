---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotify
  namespace: gotify
spec:
  selector:
    matchLabels:
      app: gotify
  template:
    metadata:
      labels:
        app: gotify
    spec:
      containers:
        - name: gotify
          image: ghcr.io/gotify/server:3.0.0@sha256:d75e89e0e28389c00c2556afe01282a37ee9756b0285799aa25214243aebd5e5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: config
            - secretRef:
                name: db-secrets
            - secretRef:
                name: basic-auth
          volumeMounts:
            - name: gotify-data
              mountPath: /app/data
      volumes:
        - name: gotify-data
          persistentVolumeClaim:
            claimName: gotify-data
