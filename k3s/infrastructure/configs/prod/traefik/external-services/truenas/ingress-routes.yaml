---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: truenas
  namespace: external-routes
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`truenas.maurovi.ch`)
      kind: Rule
      services:
        - name: truenas
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: truenas-https-redirect
  namespace: external-routes
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`truenas.maurovi.ch`)
      kind: Rule
      middlewares:
        - name: https-redirect
      services:
        - name: noop@internal
          kind: TraefikService
