---
apiVersion: v1
kind: Service
metadata:
  name: proxmox-route
  namespace: external-routes
spec:
  ports:
    - port: 8006
      name: https
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox-route
  namespace: external-routes
subsets:
  - addresses:
      - ip: 192.168.0.73
    ports:
      - port: 8006
        name: https
