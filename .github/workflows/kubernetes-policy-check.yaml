# Checks Kubernetes manifests against best-practice policies using Datree.
#
# Datree statically analyses rendered Kubernetes YAML and flags common issues:
#   - Containers missing resource requests/limits (risk of node starvation)
#   - Containers missing liveness/readiness probes (invisible crash loops)
#   - Images using mutable tags like 'latest' (non-reproducible deployments)
#   - Missing recommended labels (operability and observability gaps)
#   - Security context issues (containers running as root, etc.)
#
# We pipe the output of 'kustomize build' directly into Datree rather than
# pointing it at source files. This ensures Datree sees the fully-resolved
# manifest – with all patches applied and all references merged — exactly
# as the cluster would receive it.
#
# OFFLINE MODE: Datree's cloud service was shut down after acquisition.
# We use the offline binary with its built-in default policy set.
#
# This job is intentionally non-blocking.
# Policy violations produce a visible warning on the PR but doesn't prevent a merge.

name: Kubernetes Policy Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  datree:
    name: Datree Policy Check
    runs-on: ubuntu-latest
    continue-on-error: true # keeps the overall workflow non-blocking
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize and yq
        run: |
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/kustomize
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install Datree and operate in offline mode
        run: |
          curl -sfL https://github.com/datreeio/datree/releases/download/1.9.19/datree-cli_1.9.19_Linux_x86_64.zip \
            -o datree.zip
          unzip -q datree.zip datree
          sudo mv datree /usr/local/bin/datree
          datree config set offline local

      - name: Check apps/prod
        id: check-apps
        continue-on-error: true
        # ignore sops metadata fields to not fail the check
        run: kustomize build k3s/apps/prod | yq 'select(.sops == null)' | datree test -

      - name: Check infrastructure/controllers/prod
        id: check-infra-controllers
        continue-on-error: true
        run: kustomize build k3s/infrastructure/controllers/prod | yq 'select(.sops == null)' | datree test -

      - name: Check infrastructure/configs/prod
        id: check-infra-configs
        continue-on-error: true
        run: kustomize build k3s/infrastructure/configs/prod | yq 'select(.sops == null)' | datree test -

      # Reads each step's outcome and fails the job deliberately if any check
      # found violations.
      - name: Evaluate results
        if: always()
        run: |
          FAILED=0

          if [ "${{ steps.check-apps.outcome }}" = "failure" ]; then
            echo "✕ apps/prod failed Datree policy check"
            FAILED=1
          else
            echo "✓ apps/prod passed"
          fi

          if [ "${{ steps.check-infra-controllers.outcome }}" = "failure" ]; then
            echo "✕ infrastructure/controllers/prod failed Datree policy check"
            FAILED=1
          else
            echo "✓ infrastructure/controllers/prod passed"
          fi

          if [ "${{ steps.check-infra-configs.outcome }}" = "failure" ]; then
            echo "✕ infrastructure/configs/prod failed Datree policy check"
            FAILED=1
          else
            echo "✓ infrastructure/configs/prod passed"
          fi

          if [ $FAILED -ne 0 ]; then
            echo ""
            echo "One or more Datree policy checks found violations."
            exit 1
          fi
